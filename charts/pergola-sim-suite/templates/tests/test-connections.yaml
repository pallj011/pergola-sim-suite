{{- /*
`helm test` hooks: verify each enabled component's service accepts a TCP
connection / HTTP response. Run after install with:
    helm test <release> -n <namespace>
These are lightweight reachability checks, not functional simulation tests.
*/}}
{{- if .Values.gazebo.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "suite.fullname" . }}-test-gazebo
  labels:
    {{- include "suite.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: tcp-check
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - >-
          nc -z -w5
          {{ include "suite.componentFullname" (dict "Release" .Release "component" "gazebo") }}
          {{ .Values.gazebo.service.transportPort }}
{{- end }}
{{- if .Values.matlab.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "suite.fullname" . }}-test-matlab
  labels:
    {{- include "suite.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: http-check
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - >-
          wget -q -T 10 -O /dev/null
          http://{{ include "suite.componentFullname" (dict "Release" .Release "component" "matlab") }}:{{ .Values.matlab.service.port }}/
{{- end }}
{{- if and .Values.simulink.enabled .Values.simulink.interactive }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "suite.fullname" . }}-test-simulink
  labels:
    {{- include "suite.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: http-check
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - >-
          wget -q -T 10 -O /dev/null
          http://{{ include "suite.componentFullname" (dict "Release" .Release "component" "simulink") }}:{{ .Values.simulink.service.port }}/
{{- end }}
